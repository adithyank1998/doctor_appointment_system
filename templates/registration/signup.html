{% extends 'base.html' %}{% block content %}<div class="container narrow py-5"><div class="page-card"><span class="eyebrow">Get started</span><h1 class="h2 mt-2">Create your patient account</h1><form method="post" class="mt-4">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% if field.help_text %}<div class="form-text">{{ field.help_text|safe }}</div>{% endif %}{% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}</div>{% endfor %}<button class="btn btn-primary w-100">Create account</button></form></div></div>{% endblock %}
