{% extends 'base.html' %}
{% block title %}My Medical Profile{% endblock %}
{% block content %}
<div class="container py-4">
  <h4 class="mb-4">My Medical Profile</h4>
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save Profile</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
